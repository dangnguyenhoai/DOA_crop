<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }}</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" />
        <style>
            body {
                font-family: "Arial", sans-serif;
                background-color: #eef2f3;
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                margin: 0;
            }
            header {
                background: linear-gradient(90deg, #007bff, #0056b3);
                color: #ffffff;
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
                padding: 15px 0;
                text-align: center;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }
            main {
                flex: 1;
                padding: 20px;
            }
            .container {
                background-color: #ffffff;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                padding: 20px;
            }
            footer {
                background-color: #0056b3;
                color: #ffffff;
                text-align: center;
                padding: 10px 0;
                position: relative;
                bottom: 0;
                width: 100%;
            }
            footer a {
                color: #ffff;
                text-decoration: none;
            }
            footer a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
        <header>
            <h1>🌱 Hệ thống quản lý kế hoạch trồng cây 🌱</h1>
        </header>

        <main class="container my-5">{% block content %} {% endblock %}</main>

        <footer>
            <p>
                &copy; 2024 Quản lý kế hoạch trồng cây. All Rights Reserved. |
                <a href="/">Trang chủ</a>
            </p>
            <i>Trường đại học Công Thương TP.HCM</i>
            <i></i>
        </footer>
    </body>
</html>
